## 1. 系统概述

### 1.1 项目简介
财务分析自动化系统是一个基于AI的智能财务报告分析平台，能够自动识别、解析和分析多种格式的财务文档（图像、PDF、Word），并生成专业的财务分析报告。

### 1.2 核心价值
- **智能化分析**：利用大语言模型和多模态AI技术进行深度财务分析
- **多格式支持**：支持图像(PNG/JPG/JPEG等)、PDF、Word(.docx)等多种文件格式
- **流式输出**：实时展示分析过程，提升用户体验
- **专业报告导出**：自动生成格式化的PDF分析报告
- **灵活配置**：支持自定义分析上下文和需求

### 1.3 技术栈

#### 后端技术
- **框架**: FastAPI (Python 3.12)
- **AI引擎**: AutoGen Agent Framework (autogen-agentchat / autogen-ext[openai] 0.6.4)
- **LLM集成** (均通过 OpenAI 兼容接口接入，配置见 `backend/utils/llms.py`):
  - 阿里云 DashScope (qwen3-vl-plus) - 多模态视觉模型，用于图像分析
  - DeepSeek (deepseek-v4-pro) - 文本分析模型，用于 PDF 及其他文本
  - IBM ICA Gateway (gpt-5.4-gus) - 用于 Word(.docx) 文档分析
- **配置管理**: python-dotenv (API 密钥从 `backend/.env` 加载)
- **PDF处理**: PyPDF2, pdfplumber
- **PDF生成**: ReportLab
- **文档处理**: python-docx
- **图像处理**: Pillow

#### 前端技术
- **框架**: React 18
- **UI库**: Material-UI (MUI)
- **HTTP客户端**: Axios + Fetch API
- **构建工具**: Create React App

### 3.2 AI智能分析模块

#### 3.2.1 功能描述
根据文件类型智能选择合适的AI模型进行深度财务分析，支持流式输出。

#### 3.2.2 模型选择策略

| 文件类型 | 使用模型 | 模型提供商 | 用途 |
|---------|---------|-----------|------|
| 图像文件 | qwen3-vl-plus | 阿里云DashScope | 多模态视觉分析 |
| PDF文档 | deepseek-v4-pro | DeepSeek | 文本内容分析 |
| 其他文本文件 | deepseek-v4-pro | DeepSeek | 文本内容分析 |
| Word文档 | gpt-5.4-gus | IBM ICA Gateway | 文档结构化分析 |

> 模型选择逻辑：`.docx` 文件单独走 `_analyze_docx_with_ica`（ICA 客户端）；图像文件走支持视觉的 Qwen3-VL 客户端；PDF 及其它文本文件统一走 DeepSeek 客户端。详见 `ai_service._get_model_client_for_file_type` 与 `analyze_finance_report_stream` 的分支。

#### 3.2.3 分析流程

##### 图像文件分析流程
```
1. 加载图像文件 (Pillow)
2. 转换为AutoGen Image对象
3. 构建多模态提示词 (图像+文本)
4. 调用Qwen-VL模型进行流式分析
5. 实时返回分析结果
```

##### PDF文档分析流程
```
1. 使用pdfplumber提取文本内容
2. 提取元数据 (标题、页数、作者等)
3. 构建结构化提示词
4. 调用DeepSeek模型进行分析
5. 流式返回分析结果
```

##### Word文档分析流程
```
1. 使用python-docx读取文档段落文本 (_read_docx，在线程池中执行)
2. 文本为空时直接返回错误，不输出分析标题
3. 构建财务分析提示词 (文本截断至8000字符) + 系统消息
4. 用 ica_model_client 创建 AutoGen AssistantAgent (model_client_stream=True)
5. 通过"生产者-消费者"队列流式输出，并按字符施加打字机延迟
```

> ⚠️ **重要变更**：Word 文档分析已由原先的 **IBM WatsonX (Llama-3-2-90B-Vision)** 迁移到 **IBM ICA Gateway (gpt-5.4-gus)**。新实现不再手动获取访问令牌或拼装 WatsonX REST 请求，而是与 DeepSeek/Qwen 路径一致，复用 AutoGen `AssistantAgent` + OpenAI 兼容客户端 (`ica_model_client`)。核心方法为 `ai_service._analyze_docx_with_ica`。

**生产者-消费者流式机制（DOCX 专用）**

ICA 网关常常一次返回多个字符的 chunk，若直接在读取上游流的循环里对每个字符 `sleep(0.02)` 实现打字机效果，节流的背压会传导到 ICA 网关的 TCP 连接，导致较长分析在持续消费一分钟以上后被服务端以写超时/空闲超时主动断开（前端报 `peer closed connection ... incomplete chunked read`）。

因此实现将"读取上游流"与"打字机节流"解耦：
```
producer 协程: 尽快抽干 agent.run_stream() 的 chunk 放入 asyncio.Queue，
              让上游 HTTP 连接迅速、干净地关闭
consumer (本生成器): 从队列取出内容，按字符 sleep(0.02) 后 yield 给前端
```
若上游在产出部分内容后断开，已输出内容保留，末尾追加错误提示。

#### 3.2.5 核心代码实现

**AI服务类**: `backend/services/ai_service.py`

主要方法：
- `analyze_finance_report_stream()`: 统一的流式分析入口（按扩展名分发：docx → ICA，图像 → Qwen3-VL，PDF/其它 → DeepSeek）
- `_get_model_client_for_file_type()`: 智能模型选择（图像类返回视觉客户端，其余返回 DeepSeek 客户端）
- `_read_docx()`: 用 python-docx 读取 Word 段落文本
- `_analyze_docx_with_ica()`: Word文档专用分析（ICA 客户端 + 生产者-消费者打字机流式）

**LLM客户端配置**: `backend/utils/llms.py`

密钥统一通过 `python-dotenv` 从 `backend/.env` 读取，不再硬编码。三个客户端均为 OpenAI 兼容端点：

```python
import os
from dotenv import load_dotenv
from autogen_ext.models.openai import OpenAIChatCompletionClient

load_dotenv(Path(__file__).resolve().parent.parent / ".env")

# Qwen3-VL 客户端 (支持视觉) - 图像分析
model_client = OpenAIChatCompletionClient(
    model="qwen3-vl-plus",
    base_url="https://dashscope.aliyuncs.com/compatible-mode/v1",
    api_key=os.getenv("DASHSCOPE_API_KEY"),
    model_info={"vision": True, "function_calling": True, "json_output": True,
                "family": "unknown", "multiple_system_messages": True,
                "structured_output": True},
)

# DeepSeek 客户端 (纯文本) - PDF/文本分析
deepseek_model_client = OpenAIChatCompletionClient(
    model="deepseek-v4-pro",
    base_url="https://api.deepseek.com",
    api_key=os.getenv("DEEPSEEK_API_KEY"),
    model_info={"vision": False, ...},
)

# IBM ICA 客户端 - Word(.docx) 分析
ica_model_client = OpenAIChatCompletionClient(
    model="gpt-5.4-gus",
    base_url="https://api.nextgen-beta.ica.ibm.com/ica/v1",
    api_key=os.getenv("ICA_API_KEY"),
    model_info={"vision": False, ...},
)
```

#### 3.2.6 流式响应机制

使用AutoGen的流式输出能力，实现实时分析结果推送（图像/PDF/文本路径）：

```python
async for event in agent.run_stream(task=task_message):
    if isinstance(event, ModelClientStreamingChunkEvent):
        yield event.content  # 实时返回文本块
    elif isinstance(event, TaskResult):
        pass  # 任务完成，让循环自然结束
```

> 注意：此处对 `TaskResult` 故意使用 `pass` 而非 `break`。`TaskResult` 已是最后一个事件，提前 `break` 会触发生成器 `aclose()`，导致 AutoGen 内部的 OpenTelemetry span 在不同 async context 下 detach 失败（报 "Token was created in a different Context"）。

Word(.docx) 路径不直接使用上述循环，而是采用前述的**生产者-消费者队列 + 逐字符打字机**机制（见 3.2.3），以兼顾打字机效果与 ICA 网关连接稳定性。

### 3.4 PDF报告导出模块

#### 3.4.1 功能描述
将AI分析结果转换为格式化的PDF报告，支持中文字体渲染。

#### 3.4.2 字体支持
系统自动检测并注册以下中文字体（按优先级，命中第一个存在的即停止）：
1. macOS: STHeiti Light/Medium.ttc, PingFang.ttc, AppleSDGothicNeo.ttc, ArialHB.ttc
2. Linux: DejaVuSans.ttf, wqy-microhei.ttc, NotoSansCJK-Regular.ttc
3. Windows: simhei.ttf, simsun.ttc, msyh.ttc
4. 自定义(最后尝试): SourceHanSansSC-Regular.otf

> 说明：ReportLab 对 OTF 字体的 PostScript 轮廓支持不佳，故优先 TTF/TTC，OTF 放最后兜底。注册时字体名中的连字符 `-` 会被替换为下划线 `_`。若全部未命中，回退到内置字体 `Helvetica`。

#### 3.4.3 PDF生成流程
```
1. 接收Markdown格式的分析结果
2. 解析Markdown语法 (标题、列表、表格、加粗)
3. 过滤AI状态信息 (跳过"正在分析..."等技术信息)
4. 应用自定义样式 (标题、正文、表格)
5. 使用ReportLab生成PDF
6. 保存到 results/ 目录
```

#### 3.4.4 Markdown解析规则

| Markdown元素 | PDF处理方式 |
|-------------|------------|
| `# 标题` | 一级标题样式 (蓝色, 16pt) |
| `## 标题` | 二级标题样式 (浅蓝, 14pt) |
| `### 标题` | 三级标题样式 (加粗, 12pt) |
| `- 列表项` | 项目符号列表 (缩进10px) |
| `\|表格\|` | 格式化表格 (表头高亮) |
| `**加粗**` | 加粗文本 |
| `---` | 分隔线 (间距) |

### 14.3 常见问题 (FAQ)

**Q: 为什么分析结果出现乱码？**  
A: 检查PDF文件的编码，系统会尝试UTF-8和GBK两种编码。如果仍有问题，可能是字体缺失，请确保系统安装了中文字体。

**Q: 如何提高分析速度？**  
A: 可以尝试切换到响应更快的模型，或者减小上传文件的大小。对于PDF文件，可以先压缩再上传。

**Q: 支持的PDF文件大小有限制吗？**  
A: 当前没有硬性限制，但建议不超过50MB。过大的文件会导致内存占用过高和响应缓慢。

**Q: 可以自定义分析模板吗？**  
A: 可以通过修改 `context` 和 `requirements` 参数来引导AI按照特定格式进行分析。

    if (!h.id) {
      var slug = (h.textContent || '').trim().toLowerCase()
        .replace(/[^\w\u4e00-\u9fa5]+/g, '-').replace(/^-+|-+$/g, '') || 'h';
      if (seen[slug]) { slug += '-' + (++seen[slug]); } else { seen[slug] = 1; }
      h.id = slug;
    }
    if (h.tagName === 'H1') return; // skip the doc title in TOC
    var li = document.createElement('li');
    var a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent;
    a.className = 'lvl-' + h.tagName.charAt(1);
    li.appendChild(a);
    toc.appendChild(li);
    a.addEventListener('click', function () { document.body.classList.remove('nav-open'); });
  });

  // Scrollspy
  var links = Array.prototype.slice.call(toc.querySelectorAll('a'));
  var map = {};
  links.forEach(function (a) { map[a.getAttribute('href').slice(1)] = a; });
  var observer = new IntersectionObserver(function (entries) {
    entries.forEach(function (en) {
      if (en.isIntersecting) {
        links.forEach(function (l) { l.classList.remove('active'); });
        var act = map[en.target.id];
        if (act) {
          act.classList.add('active');
          act.scrollIntoView({ block: 'nearest' });
        }
      }
    });
  }, { rootMargin: '0px 0px -75% 0px', threshold: 0 });
  doc.querySelectorAll('h2, h3').forEach(function (h) { observer.observe(h); });

  // Mobile menu toggle
  document.getElementById('menu-toggle').addEventListener('click', function () {
    document.body.classList.toggle('nav-open');
  });
})();
</script>
</body>
</html>
